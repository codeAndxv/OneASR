# OneASR 模型配置文件

# API Key（所有接口必须携带此 key）
api_key: oneasr-key

# 默认 Provider
default_provider: whisper1

# 模型根目录（取消注释并指定路径可强制使用本地模型）
# model_dir: ./models

# Provider 配置
providers:
  whisper1:
    engine: faster-whisper  # 底层引擎类型
    type: local             # local 或 cloud
    model_name: medium
    device: cpu
    compute_type: int8
    max_duration: null      # 无时长限制

  # 云端 Provider 示例（取消注释并填写 API Key 即可使用）
  # openai-whisper:
  #   engine: openai
  #   type: cloud
  #   model_name: whisper-1
  #   api_key: sk-xxx  # 或设置环境变量 OPENAI_API_KEY
  #   base_url: https://api.openai.com/v1

  mimo:
    engine: mimo
    type: cloud
    model_name: mimo-audio
    api_key:   # 小米 MiMo API Key
    base_url:

  # WhisperLiveKit 流式识别（支持 VAD/VAC、实时转录、说话人分离）
  wlk-live:
    engine: whisperlivekit
    type: local
    model_name: base           # Whisper 模型大小: tiny/base/small/medium/large-v3
    device: cpu
    compute_type: int8
    backend: auto              # auto / faster-whisper / whisper / mlx-whisper
    backend_policy: simulstreaming  # simulstreaming（低延迟） / localagreement（高准确）
    language: auto             # auto / zh / en / ja 等
    vac: true                  # 语音活动控制（Silero VAD）
    diarization: false         # 说话人分离
    pcm_input: true            # 接收原始 PCM s16le 16kHz mono（绕过 FFmpeg）
